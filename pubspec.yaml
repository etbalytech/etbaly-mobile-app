name: etbaly
description: Production-ready Flutter scaffold generated by the wizard.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^17.1.0

  # Networking
  internet_connection_checker_plus: ^2.9.1+2
  dio: ^5.9.2

  # State Management
  fpdart: ^1.2.0
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1

  # Backend – Firebase

  # Backend – Supabase

  # Backend – Appwrite

  # Storage
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

  # Images & SVG
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.4

  # Icons
  font_awesome_flutter: ^10.8.0

  # Shimmer / Skeleton
  skeletonizer: ^2.1.3

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Animations
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1
  video_player: ^2.10.1

  # Environment
  flutter_dotenv: ^6.0.0

  # Logging
  logger: ^2.6.2

  # Media
  image_picker: ^1.2.1
  file_picker: ^10.3.10

  # Utilities
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  permission_handler: ^12.0.1

  # Device & System
  device_info_plus: ^11.2.0
  app_version_update: ^6.2.0


  # Localization
  easy_localization: ^3.0.8

  flutter_native_splash: ^2.4.7
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

  # Code Generation

dependency_overrides:

flutter_launcher_icons:
  image_path: assets/images/logo.png
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/images/logo.png
    background_color: "#0F0E18"
    theme_color: "#6F3FF5"
  windows:
    generate: true
    image_path: assets/images/logo.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/images/logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/images/partners/
    - assets/images/services/
    - assets/images/strip/
    - assets/images/about/
    - assets/images/about/team/
    - assets/images/about/contract/
    - assets/images/packages/
    - assets/images/portfolio/
    - assets/images/portfolio/industries/
    - assets/images/portfolio/media/
    - assets/files/portfolio/
    - assets/videos/about/
    - assets/icons/
    - assets/translations/
    - assets/fonts/
    - assets/fonts/sora/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/tajwal/Tajawal-Black.ttf
        - asset: assets/fonts/tajwal/Tajawal-Bold.ttf
        - asset: assets/fonts/tajwal/Tajawal-ExtraBold.ttf
        - asset: assets/fonts/tajwal/Tajawal-ExtraLight.ttf
        - asset: assets/fonts/tajwal/Tajawal-Light.ttf
        - asset: assets/fonts/tajwal/Tajawal-Medium.ttf
        - asset: assets/fonts/tajwal/Tajawal-Regular.ttf
    - family: Sora
      fonts:
        - asset: assets/fonts/sora/Sora-Regular.ttf
        - asset: assets/fonts/sora/Sora-Medium.ttf
          weight: 500
        - asset: assets/fonts/sora/Sora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/sora/Sora-Bold.ttf
          weight: 700
        - asset: assets/fonts/sora/Sora-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/sora/Sora-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/sora/Sora-Light.ttf
          weight: 300
        - asset: assets/fonts/sora/Sora-Thin.ttf
          weight: 100
