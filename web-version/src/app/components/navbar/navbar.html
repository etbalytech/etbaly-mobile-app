<nav class="navbar navbar-expand-lg sticky-top" [class.scrolled]="isScrolled">
  <div class="container">
    <!-- Brand -->
    <a class="navbar-brand" routerLink="/">
      <img src="logo.png" alt="{{ 'NAV.Brand' | translate }}" class="navbar-logo" />
      <span class="brand-text">
        {{ 'NAV.Brand' | translate }}
      </span>
    </a>

    <!-- Mobile Controls -->
    <div class="mobile-controls d-lg-none">
      <!-- Theme -->
      <button class="btn-theme-toggle" (click)="theme.toggleTheme()">
        <i class="fas" [ngClass]="theme.isDarkMode() ? 'fa-sun' : 'fa-moon'"></i>
      </button>

      <!-- Hamburger -->
      <button class="navbar-toggler" type="button" (click)="toggleMenu()">
        <span class="burger" [class.active]="isMenuOpen">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>
    </div>

    <!--  Menu Controlled by Angular -->
    <div class="navbar-collapse" [class.show]="isMenuOpen">
      <!-- Nav Links -->
      <ul class="navbar-nav mx-auto">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeNavbar()"
          >
            {{ 'NAV.HOME' | translate }}
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/services"
            routerLinkActive="active"
            (click)="closeNavbar()"
          >
            {{ 'NAV.SERVICES' | translate }}
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/portfolio"
            routerLinkActive="active"
            (click)="closeNavbar()"
          >
            {{ 'NAV.PORTFOLIO' | translate }}
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/contact"
            routerLinkActive="active"
            (click)="closeNavbar()"
          >
            {{ 'NAV.CONTACT' | translate }}
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/about" routerLinkActive="active" (click)="closeNavbar()">
            {{ 'NAV.ABOUT' | translate }}
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/payments"
            routerLinkActive="active"
            (click)="closeNavbar()"
          >
            {{ 'NAV.PAYMENTS' | translate }}
          </a>
        </li>
      </ul>

      <!-- Desktop Controls -->
      <div class="nav-controls">
        <button class="btn-theme-toggle d-none d-lg-flex" (click)="theme.toggleTheme()">
          <i class="fas" [ngClass]="theme.isDarkMode() ? 'fa-lightbulb' : 'fa-moon'"></i>
        </button>

        <button class="btn-lang-toggle" (click)="theme.toggleLanguage()">
          <i class="fas fa-globe"></i>
          <span>
            {{ theme.currentLang() === 'ar' ? 'EN' : 'عربي' }}
          </span>
        </button>

        <a routerLink="/contact" class="btn btn-gold rounded-pill px-4 py-2 nav-cta">
          {{ 'NAV.CONTACT' | translate }}
        </a>
      </div>
    </div>
  </div>
</nav>
