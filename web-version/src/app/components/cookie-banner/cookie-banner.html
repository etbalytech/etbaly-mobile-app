<!-- Cookie Consent Banner -->
<div
  *ngIf="visible()"
  class="cookie-banner"
  [class.cookie-banner--leaving]="leaving()"
  [attr.data-bs-theme]="bannerTheme()"
  [attr.dir]="isArabic ? 'rtl' : 'ltr'"
  role="dialog"
  aria-live="polite"
  aria-label="{{ isArabic ? 'إشعار ملفات تعريف الارتباط' : 'Cookie consent notice' }}"
>
  <!-- Gold top border accent -->
  <div class="cookie-banner__accent"></div>

  <div class="cookie-banner__inner">
    <!-- Icon -->
    <div class="cookie-banner__icon" aria-hidden="true">
      <svg
        width="28"
        height="28"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10c0-.342-.018-.68-.052-1.013a2.5 2.5 0 01-2.934-2.934A2.5 2.5 0 0116 5.052 9.978 9.978 0 0012 2z"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <circle cx="8.5" cy="14.5" r="1.5" fill="currentColor" />
        <circle cx="14" cy="10" r="1" fill="currentColor" />
        <circle cx="11" cy="17" r="1" fill="currentColor" />
        <circle cx="16" cy="16" r="1.25" fill="currentColor" />
      </svg>
    </div>

    <!-- Content -->
    <div class="cookie-banner__content">
      <p class="cookie-banner__text" *ngIf="isArabic">
        نستخدم ملفات تعريف الارتباط (Cookies) لتحسين تجربتك وتحليل أداء الموقع. باستمرارك في التصفح،
        فأنت توافق على استخدامها وفق
        <a routerLink="/privacy" class="cookie-banner__link">سياسة الخصوصية</a>.
      </p>
      <p class="cookie-banner__text" *ngIf="!isArabic">
        We use cookies to enhance your experience and analyze site performance. By continuing to
        browse, you agree to their use as described in our
        <a routerLink="/privacy" class="cookie-banner__link">Privacy Policy</a>.
      </p>
    </div>

    <!-- Actions -->
    <div class="cookie-banner__actions">
      <button class="cookie-banner__btn cookie-banner__btn--accept" (click)="accept()">
        <i class="fas fa-check" aria-hidden="true"></i>
        <span>{{ isArabic ? 'حسناً، فهمت' : 'Got it' }}</span>
      </button>
    </div>

    <!-- Close X -->
    <button
      class="cookie-banner__close"
      (click)="accept()"
      [attr.aria-label]="isArabic ? 'إغلاق' : 'Close'"
    >
      <i class="fas fa-times" aria-hidden="true"></i>
    </button>
  </div>
</div>
