        <stop offset="30%" stop-color="rgba(245,200,66,0.8)" />
        <stop offset="100%" stop-color="rgba(201,162,39,0)" />
      </radialGradient>
      <!-- filter للتوهج -->
      <filter id="glow-sm">
        <feGaussianBlur stdDeviation="2" result="coloredBlur" />
        <feMerge>
          <feMergeNode in="coloredBlur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
      <filter id="glow-md">
        <feGaussianBlur stdDeviation="4" result="coloredBlur" />
        <feMerge>
          <feMergeNode in="coloredBlur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
      <filter id="glow-lg">
        <feGaussianBlur stdDeviation="8" result="coloredBlur" />
        <feMerge>
          <feMergeNode in="coloredBlur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>

<!-- ═══════════════════════════════════════════════════════════════

     ═══════════════════════════════════════════════════════════════ -->

<div
  class="wa-message-bubble"
  [class.wa-message-bubble--visible]="waBubbleVisible"
  [attr.dir]="currentLang === 'ar' ? 'rtl' : 'ltr'"
  aria-live="polite"
>
  <!-- ── Header زي واتساب الحقيقي ── -->

      <!-- أيقونة واتساب صغيرة في الأفاتار -->

      </svg>

      <div class="wa-bubble-name">
        {{ currentLang === 'ar' ? 'اطبعلي' : 'Etbaly' }}

        {{ currentLang === 'ar' ? 'متاح الآن' : 'Available now' }}
      </div>
    </div>
  </div>

  <!-- ── Body - فقاعة الرسالة ── -->
  <div class="wa-bubble-body">
    <div class="wa-bubble-msg">
      <span class="wa-message-text">{{ waCurrentMessage }}</span>
      <div class="wa-bubble-time">{{ currentLang === 'ar' ? 'الآن' : 'now' }}</div>
    </div>

    <!-- أكشن بوتامز -->
    <div class="wa-message-close-row">
      <!-- زرار "رد الآن" -->
      <a [href]="whatsappLink" target="_blank" rel="noopener noreferrer" class="wa-reply-btn">

          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"

        [attr.aria-label]="currentLang === 'ar' ? 'إغلاق' : 'Close'"
      ></button>
    </div>
  </div>

  <!-- ذيل الفقاعة -->
  <span class="wa-bubble-tail" aria-hidden="true"></span>
