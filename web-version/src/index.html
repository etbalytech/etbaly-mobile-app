<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Twitter -->

    <meta name="theme-color" content="#0a0a0a" />

    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />

    <!-- Structured Data (dynamic) -->
    <script type="application/ld+json" id="structured-data">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "",
        "url": "",

        "description": "",
        "inLanguage": ""
      }

    <style>
      /* ─── Splash Root ─────────────────────────────── */
      #lux-splash {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: opacity 0.7s ease;

        /* dark default — overridden by JS before paint */
        background: #080807;
      }

      /* ─── Light Mode ──────────────────────────────── */
      #lux-splash.light {
        background: #f7f3ec;
      }

      /* ─── Noise overlay ──────────────────────────── */
      #lux-splash::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
        opacity: 0.035;
        pointer-events: none;
      }

      /* ─── Radial glow center ─────────────────────── */
      #lux-splash::after {
        content: '';
        position: absolute;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(212, 175, 55, 0.09) 0%, transparent 70%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        animation: glow-breathe 3s ease-in-out infinite;
      }

      #lux-splash.light::after {
        background: radial-gradient(circle, rgba(184, 148, 30, 0.12) 0%, transparent 70%);
      }

      /* ─── Grid Lines ─────────────────────────────── */
      .splash-grid {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        animation: grid-fade-in 1.2s ease forwards 0.3s;
      }

      .splash-grid line {
        stroke: #d4af37;
        stroke-width: 0.3;
        stroke-dasharray: 4 6;
      }

      #lux-splash.light .splash-grid line {
        stroke: #b8941e;
        opacity: 0.45;
      }

      /* ─── Corner ornaments ───────────────────────── */
      .corner {
        position: absolute;
        width: 40px;
        height: 40px;
        opacity: 0;
        animation: corner-in 0.8s ease forwards;
      }
      .corner svg {
        width: 100%;
        height: 100%;
      }
      .corner-tl {
        top: 28px;
        left: 28px;
        animation-delay: 0.5s;
      }
      .corner-tr {
        top: 28px;
        right: 28px;
        transform: scaleX(-1);
        animation-delay: 0.6s;
      }
      .corner-bl {
        bottom: 28px;
        left: 28px;
        transform: scaleY(-1);
        animation-delay: 0.7s;
      }
      .corner-br {
        bottom: 28px;
        right: 28px;
        transform: scale(-1);
        animation-delay: 0.8s;
      }

      .corner-stroke {
        stroke: #d4af37;
        fill: none;
        stroke-width: 1;
      }
      #lux-splash.light .corner-stroke {
        stroke: #b8941e;
      }

      /* ─── Loader Container ───────────────────────── */
      .lux-loader {
        text-align: center;
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }

      /* ─── Logo area ──────────────────────────────── */
      .logo-wrap {
        position: relative;
        width: 100px;
        height: 100px;
        margin-bottom: 20px;
        opacity: 0;
        animation: logo-rise 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.2s;
      }

      .logo-img {
        width: 60px;
        height: 60px;
        object-fit: contain;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border-radius: 12px;
      }

      /* ─── Dual ring system ───────────────────────── */
      .ring-outer {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 1px solid rgba(212, 175, 55, 0.12);
        border-top: 1.5px solid #d4af37;
        animation: spin 2s linear infinite;
      }

      .ring-inner {
        position: absolute;
        inset: 10px;
        border-radius: 50%;
        border: 1px solid rgba(212, 175, 55, 0.07);
        border-bottom: 1px solid rgba(212, 175, 55, 0.5);
        animation: spin-reverse 1.5s linear infinite;
      }

      #lux-splash.light .ring-outer {
        border-color: rgba(184, 148, 30, 0.12);
        border-top-color: #b8941e;
      }
      #lux-splash.light .ring-inner {
        border-color: rgba(184, 148, 30, 0.07);
        border-bottom-color: rgba(184, 148, 30, 0.5);
      }

      /* ─── Brand name ─────────────────────────────── */
      .brand-name {
        font-family: 'Georgia', 'Times New Roman', serif;
        font-weight: 400;
        font-size: 34px;
        letter-spacing: 8px;
        color: #d4af37;
        margin: 0 0 6px 0;
        opacity: 0;
        animation: text-reveal 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.5s;
      }

      #lux-splash.light .brand-name {
        color: #8a6800;
      }

      /* ─── Divider ────────────────────────────────── */
      .divider {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 240px;
        margin-bottom: 14px;
        opacity: 0;
        animation: text-reveal 0.7s ease forwards 0.7s;
      }
      .divider-line {
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.4));
      }
      .divider-line.right {
        background: linear-gradient(270deg, transparent, rgba(212, 175, 55, 0.4));
      }
      .divider-diamond {
        width: 5px;
        height: 5px;
        background: #d4af37;
        transform: rotate(45deg);
        opacity: 0.7;
      }
      #lux-splash.light .divider-line {
        background: linear-gradient(90deg, transparent, rgba(184, 148, 30, 0.4));
      }
      #lux-splash.light .divider-line.right {
        background: linear-gradient(270deg, transparent, rgba(184, 148, 30, 0.4));
      }
      #lux-splash.light .divider-diamond {
        background: #b8941e;
      }

      /* ─── Subtitle ───────────────────────────────── */
      .sub-text {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-weight: 300;
        font-size: 12px;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: #888;
        opacity: 0;
        animation: text-reveal 0.7s ease forwards 0.85s;
      }

      #lux-splash.light .sub-text {
        color: #999;
      }

      /* ─── Progress track ─────────────────────────── */
      .progress-wrap {
        margin-top: 40px;
        width: 220px;
        opacity: 0;
        animation: text-reveal 0.6s ease forwards 1s;
      }
      .progress-track {
        height: 1px;
        background: rgba(212, 175, 55, 0.12);
        position: relative;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        width: 0%;
        background: #d4af37;
        animation: progress-fill 1.6s cubic-bezier(0.4, 0, 0.2, 1) forwards 0.3s;
        box-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
      }
      .progress-dots {
        display: flex;
        justify-content: space-between;
        margin-top: 8px;
      }
      .dot {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: rgba(212, 175, 55, 0.2);
      }
      .dot.active {
        background: rgba(212, 175, 55, 0.6);
      }

      #lux-splash.light .progress-track {
        background: rgba(184, 148, 30, 0.12);
      }
      #lux-splash.light .progress-bar {
        background: #b8941e;
        box-shadow: 0 0 8px rgba(184, 148, 30, 0.4);
      }
      #lux-splash.light .dot {
        background: rgba(184, 148, 30, 0.2);
      }
      #lux-splash.light .dot.active {
        background: rgba(184, 148, 30, 0.6);
      }

      /* ─── Animations ─────────────────────────────── */
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes spin-reverse {
        to {
          transform: rotate(-360deg);
        }
      }

      @keyframes glow-breathe {
        0%,
        100% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 0.7;
        }
        50% {
          transform: translate(-50%, -50%) scale(1.15);
          opacity: 1;
        }
      }

      @keyframes grid-fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 0.25;
        }
      }

      #lux-splash.light .splash-grid {
        animation: grid-fade-in-light 1.2s ease forwards 0.3s;
      }
      @keyframes grid-fade-in-light {
        from {
          opacity: 0;
        }
        to {
          opacity: 0.6;
        }
      }

      @keyframes corner-in {
        from {
          opacity: 0;
          transform: scale(0.5);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .corner-tr {
        transform-origin: right top;
      }
      .corner-bl {
        transform-origin: left bottom;
      }
      .corner-br {
        transform-origin: right bottom;
      }

      @keyframes logo-rise {
        from {
          opacity: 0;
          transform: translateY(14px) scale(0.92);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes text-reveal {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes progress-fill {
        0% {
          width: 0%;
        }
        30% {
          width: 25%;
        }
        60% {
          width: 65%;
        }
        85% {
          width: 88%;
        }
        100% {
          width: 100%;
        }
      }

      /* ─── Fade out ───────────────────────────────── */
      #lux-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      @media (max-width: 768px) {
        .logo-wrap {
          width: 80px;
          height: 80px;
        }

        .logo-img {
          width: 50px;
          height: 50px;
        }

        .brand-name {
          font-size: 24px;
          letter-spacing: 5px;
        }

        .divider {
          width: 160px;
        }

        .sub-text {
          font-size: 10px;
          letter-spacing: 3px;
        }

        .progress-wrap {
          width: 150px;
          margin-top: 30px;
        }

        .corner {
          width: 28px;
          height: 28px;
        }
      }
    </style>
    <link rel="manifest" href="manifest.webmanifest" />
  </head>

  <body>
    <div id="lux-splash">
      <!-- Grid lines (decorative) -->
      <svg class="splash-grid" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- vertical lines -->
        <line x1="20%" y1="0" x2="20%" y2="100%" />
        <line x1="50%" y1="0" x2="50%" y2="100%" />
        <line x1="80%" y1="0" x2="80%" y2="100%" />
        <!-- horizontal lines -->
        <line x1="0" y1="25%" x2="100%" y2="25%" />
        <line x1="0" y1="75%" x2="100%" y2="75%" />
      </svg>

      <!-- Corner ornaments -->
      <div class="corner corner-tl">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <polyline points="0,20 0,0 20,0" class="corner-stroke" />
          <circle cx="0" cy="0" r="2.5" fill="#d4af37" class="corner-dot" />
        </svg>
      </div>
      <div class="corner corner-tr">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <polyline points="0,20 0,0 20,0" class="corner-stroke" />
          <circle cx="0" cy="0" r="2.5" fill="#d4af37" class="corner-dot" />
        </svg>
      </div>
      <div class="corner corner-bl">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <polyline points="0,20 0,0 20,0" class="corner-stroke" />
          <circle cx="0" cy="0" r="2.5" fill="#d4af37" class="corner-dot" />
        </svg>
      </div>
      <div class="corner corner-br">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <polyline points="0,20 0,0 20,0" class="corner-stroke" />
          <circle cx="0" cy="0" r="2.5" fill="#d4af37" class="corner-dot" />
        </svg>
      </div>

      <!-- Main Loader -->
      <div class="lux-loader">
        <div class="logo-wrap">
          <div class="ring-outer"></div>
          <div class="ring-inner"></div>
          <img
            src="/logo.png"
            class="logo-img"
            alt="Etbaly"
            onerror="this.style.display = 'none'"
          />
        </div>

        <div class="brand-name" id="brandName">اطْبَعَلِيٌّ</div>

        <div class="divider">
          <div class="divider-line"></div>
          <div class="divider-diamond"></div>
          <div class="divider-line right"></div>
        </div>

        <div class="sub-text" id="subText">جاري التحميل</div>

        <div class="progress-wrap">
          <div class="progress-track">
            <div class="progress-bar"></div>
          </div>
          <div class="progress-dots">
            <div class="dot active"></div>
            <div class="dot active"></div>
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
        </div>
      </div>
    </div>

    <app-root></app-root>

    <script>
      // ── Apply theme & lang BEFORE first paint ──────────
      (function () {
        const theme = localStorage.getItem('theme') || 'dark';
        const lang = localStorage.getItem('lang') || 'ar';
        const splash = document.getElementById('lux-splash');
        const brandEl = document.getElementById('brandName');
        const subEl = document.getElementById('subText');

        if (theme === 'light') {
          splash.classList.add('light');
        }

        if (lang === 'en') {
          brandEl.textContent = '𝗘𝘁𝗯𝗮𝗹𝘆';
          subEl.textContent = 'Loading';
          document.documentElement.dir = 'ltr';
          document.documentElement.lang = 'en';
        } else {
          document.documentElement.dir = 'rtl';
          document.documentElement.lang = 'ar';
        }
      })();

      // ── Dismiss after app load ─────────────────────────
      window.addEventListener('load', function () {
        var splash = document.getElementById('lux-splash');
        setTimeout(function () {
          splash.classList.add('fade-out');
          setTimeout(function () {
            splash.style.display = 'none';
          }, 700);
        }, 1200);
      });
    </script>
    <noscript>Please enable JavaScript to continue using this application.</noscript>
  </body>
</html>
